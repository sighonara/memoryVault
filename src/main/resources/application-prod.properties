# Prod profile — activate with SPRING_PROFILES_ACTIVE=prod

# Database (RDS)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# CORS
memoryvault.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# JWT (from environment / Secrets Manager)
memoryvault.jwt.secret=${JWT_SECRET}

# GraphiQL disabled in production
spring.graphql.graphiql.enabled=false

# WebSocket
memoryvault.websocket.allowed-origins=${memoryvault.cors.allowed-origins}

# AWS S3 storage
memoryvault.storage.s3-bucket=${MEMORYVAULT_STORAGE_S3__BUCKET}
memoryvault.storage.s3-region=${MEMORYVAULT_STORAGE_S3__REGION:us-east-1}

# AWS CloudWatch Logs
memoryvault.logging.cloudwatch-log-group=${MEMORYVAULT_LOGGING_CLOUDWATCH__LOG__GROUP:/memoryvault/app}
memoryvault.logging.cloudwatch-region=${MEMORYVAULT_LOGGING_CLOUDWATCH__REGION:us-east-1}

# AWS Cognito
memoryvault.cognito.region=${MEMORYVAULT_COGNITO_REGION:us-east-1}
memoryvault.cognito.user-pool-id=${MEMORYVAULT_COGNITO_USER__POOL__ID}
