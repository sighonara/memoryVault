name: Infrastructure Test

# Manual-only: tears down and rebuilds the full AWS stack, then smoke tests.
# Use before releases or after significant infra changes.
on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "destroy" to confirm full teardown and rebuild'
        required: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  infra-test:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm_destroy == 'destroy' }}

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
      TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET }}
      TF_VAR_internal_api_key: ${{ secrets.TF_VAR_INTERNAL_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REPO: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/memoryvault
        run: |
          docker build -t "$ECR_REPO:${{ github.sha }}" -t "$ECR_REPO:latest" .
          docker push "$ECR_REPO:${{ github.sha }}"
          docker push "$ECR_REPO:latest"

      - name: Terraform destroy
        working-directory: terraform
        run: |
          terraform init
          terraform destroy -auto-approve

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve

      - name: Wait for instance and app
        run: |
          echo "Waiting for app to become healthy (up to 5 minutes)..."
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://mem-vault.com/actuator/health || echo "000")
            if [ "$status" = "200" ]; then
              echo "App healthy after ~${i}0 seconds"
              break
            fi
            echo "  Attempt $i: status=$status, retrying in 10s..."
            sleep 10
          done
          # Final check — fail if still not healthy
          curl -sf https://mem-vault.com/actuator/health

      - name: Run smoke tests
        run: ./scripts/smoke-test.sh https://mem-vault.com

      - name: Report result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## Infrastructure Test PASSED" >> "$GITHUB_STEP_SUMMARY"
            echo "Full destroy + rebuild + smoke test succeeded." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Infrastructure Test FAILED" >> "$GITHUB_STEP_SUMMARY"
            echo "Check logs above for details." >> "$GITHUB_STEP_SUMMARY"
          fi
