<div class="article-list">
  @for (item of store.items(); track item.id) {
    <mat-card
      class="article-card"
      [class.read]="!!item.readAt"
      [attr.data-item-id]="item.id"
      [attr.data-read]="!!item.readAt"
    >
      <mat-card-header>
        <mat-card-title>{{ item.title }}</mat-card-title>
        <mat-card-subtitle>{{ item.author }} - {{ item.publishedAt | date:'medium' }}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <div class="article-content" [innerHTML]="item.content"></div>
      </mat-card-content>
      <mat-card-actions align="end">
        <button mat-button (click)="toggleReadStatus(item.id, !!item.readAt)">
          <mat-icon>{{ item.readAt ? 'mark_email_unread' : 'mark_email_read' }}</mat-icon>
          {{ item.readAt ? 'Mark Unread' : 'Mark Read' }}
        </button>
        <a mat-button color="primary" [href]="item.url" target="_blank">
          <mat-icon>open_in_new</mat-icon> View Original
        </a>
      </mat-card-actions>
    </mat-card>
  }

  @if (store.items().length === 0 && !store.loadingItems()) {
    <div class="empty-state">
      <mat-icon>done_all</mat-icon>
      <p>No articles to read!</p>
    </div>
  }
</div>
