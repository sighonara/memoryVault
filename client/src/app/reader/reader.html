<mat-sidenav-container class="reader-container">
  <mat-sidenav mode="side" opened class="reader-sidebar">
    <mat-toolbar color="accent">Feeds</mat-toolbar>
    <mat-nav-list>
      <div *ngIf="store.loadingFeeds()" class="spinner-container">
        <mat-spinner diameter="30"></mat-spinner>
      </div>
      <mat-list-item
        *ngFor="let f of store.feeds()"
        (click)="onSelectFeed(f.feed.id)"
        [class.selected]="store.selectedFeedId() === f.feed.id"
      >
        <span matListItemTitle>{{ f.feed.title }}</span>
        <span matListItemMeta>
          <span
            *ngIf="f.unreadCount > 0"
            matBadge="{{ f.unreadCount }}"
            matBadgeColor="warn"
            matBadgeOverlap="false"
          ></span>
        </span>
      </mat-list-item>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="reader-content">
    <mat-toolbar>
      <span>{{ (store.feeds().find(f => f.feed.id === store.selectedFeedId()))?.feed?.title || 'Select a feed' }}</span>
      <span class="spacer"></span>
      <button mat-button (click)="onToggleUnread(!store.unreadOnly())">
        <mat-icon>{{ store.unreadOnly() ? 'visibility' : 'visibility_off' }}</mat-icon>
        {{ store.unreadOnly() ? 'Show All' : 'Show Unread' }}
      </button>
      <button mat-icon-button (click)="store.loadFeeds()">
        <mat-icon>refresh</mat-icon>
      </button>
    </mat-toolbar>

    <div *ngIf="store.loadingItems()" class="spinner-container large">
      <mat-spinner></mat-spinner>
    </div>

    <div class="article-list" *ngIf="!store.loadingItems()">
      <mat-accordion multi>
        <mat-expansion-panel
          *ngFor="let item of store.items()"
          (opened)="onMarkRead(item.id)"
          class="article-panel"
          [class.read]="!!item.readAt"
        >
          <mat-expansion-panel-header>
            <mat-panel-title>
              {{ item.title }}
            </mat-panel-title>
            <mat-panel-description>
              {{ item.author }} - {{ item.publishedAt | date:'short' }}
            </mat-panel-description>
          </mat-expansion-panel-header>

          <div class="article-content">
            <div [innerHTML]="item.content"></div>
            <mat-divider></mat-divider>
            <div class="article-footer">
              <a mat-button color="primary" [href]="item.url" target="_blank">
                <mat-icon>open_in_new</mat-icon> View Original
              </a>
            </div>
          </div>
        </mat-expansion-panel>
      </mat-accordion>

      <div *ngIf="store.items().length === 0 && !store.loadingItems()" class="empty-state">
        <mat-icon>done_all</mat-icon>
        <p>No articles to read!</p>
      </div>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
