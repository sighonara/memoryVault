<h2 mat-dialog-title>Import OPML</h2>
<mat-dialog-content>
  @if (!result()) {
    <div class="upload-area">
      <input type="file" accept=".opml,.xml" (change)="onFileSelected($event)" #fileInput hidden />
      <button mat-stroked-button (click)="fileInput.click()">
        <mat-icon>upload_file</mat-icon>
        {{ fileName() || 'Choose OPML file' }}
      </button>
    </div>

    @if (importing()) {
      <div class="spinner-container">
        <mat-spinner diameter="30"></mat-spinner>
        <span>Importing...</span>
      </div>
    }
  } @else {
    <div class="results">
      <p><strong>Import Complete</strong></p>
      <p>Feeds added: {{ result().feedsAdded }}</p>
      <p>Feeds skipped (duplicate): {{ result().feedsSkipped }}</p>
      <p>Categories created: {{ result().categoriesCreated }}</p>
    </div>
  }
</mat-dialog-content>
<mat-dialog-actions align="end">
  @if (!result()) {
    <button mat-button (click)="close()">Cancel</button>
    <button mat-flat-button color="primary" [disabled]="!fileName() || importing()" (click)="importFile()">Import</button>
  } @else {
    <button mat-flat-button color="primary" (click)="close()">Done</button>
  }
</mat-dialog-actions>
